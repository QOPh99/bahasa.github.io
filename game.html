<body>
  <button class="spin-btn" id="myButton">
    🎮

  <script>
    const button = document.getElementById('myButton');

    button.addEventListener('click', () => {
      // Prevent spamming / overlapping animations
      if (button.classList.contains('spinning')) return;

      // Start spinning
      button.classList.add('spinning');
      button.textContent = '🎮';

      // Stop after exactly 3 seconds
      setTimeout(() => {
        button.classList.remove('spinning');
        button.textContent = '🎮';
      }, 1100);
    });
  </script>
</body>
